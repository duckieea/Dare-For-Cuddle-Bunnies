<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Lato:wght@300;400&display=swap');

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    width: 100%;
    min-height: 100%;
    overflow-x: hidden;
    font-family: 'Lato', sans-serif;
  }

  body {
    margin: 0;
    padding: 0;
    background: linear-gradient(150deg, #fdf0f5 0%, #f5eeff 55%, #fff5f0 100%);
  }

  .root {
    width: 100%;
    min-height: 100vh;
    padding: 24px 18px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background: linear-gradient(150deg, #fdf0f5 0%, #f5eeff 55%, #fff5f0 100%);
    font-family: 'Lato', sans-serif;
  }

  .bg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .hp {
    position: absolute;
    opacity: 0.11;
    animation: floatUp linear infinite;
    color: #d4748a;
    user-select: none;
  }

  @keyframes floatUp {
    0%   { transform: translateY(110%) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.11; }
    90%  { opacity: 0.07; }
    100% { transform: translateY(-15%) rotate(18deg); opacity: 0; }
  }

  .sp {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    animation: sparkle ease-in-out infinite;
  }

  @keyframes sparkle {
    0%,100% { opacity: 0; transform: scale(0); }
    50% { opacity: 0.22; transform: scale(1); }
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 7vw, 2.3rem);
    color: #8b4d6b;
    text-align: center;
    margin-bottom: 8px;
    z-index: 1;
  }

  .sub {
    font-size: clamp(0.78rem, 3vw, 0.9rem);
    color: #b08898;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 26px;
    letter-spacing: 1px;
    z-index: 1;
  }

  .card-wrap {
    width: 100%;
    max-width: 360px;
    z-index: 1;
    margin-bottom: 24px;
  }

  .card {
    width: 100%;
    min-height: 230px;
    border-radius: 22px;
    background: rgba(255,255,255,0.88);
    border: 1px solid rgba(212,160,180,0.25);
    box-shadow: 0 10px 30px rgba(180,100,140,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px 22px;
    text-align: center;
    position: relative;
    backdrop-filter: blur(10px);
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 22px;
    background: linear-gradient(
      135deg,
      rgba(255,220,230,0.35),
      rgba(240,210,255,0.16)
    );
  }

  .card.out { animation: flipOut 0.32s ease forwards; }
  .card.in { animation: flipIn 0.32s ease forwards; }

  @keyframes flipOut {
    from { transform: rotateY(0deg) scale(1); opacity: 1; }
    to { transform: rotateY(88deg) scale(0.95); opacity: 0; }
  }

  @keyframes flipIn {
    from { transform: rotateY(-88deg) scale(0.95); opacity: 0; }
    to { transform: rotateY(0deg) scale(1); opacity: 1; }
  }

  .card-icon {
    position: absolute;
    top: 14px;
    left: 16px;
    font-size: 1rem;
    opacity: 0.35;
  }

  .card-num {
    position: absolute;
    bottom: 12px;
    right: 16px;
    font-size: 0.72rem;
    color: rgba(170,110,140,0.45);
  }

  .card-text {
    position: relative;
    z-index: 1;
    font-family: 'Playfair Display', serif;
    font-size: clamp(1rem, 4vw, 1.15rem);
    color: #7a3f5c;
    line-height: 1.7;
    font-style: italic;
    word-wrap: break-word;
  }

  .card-text.ph {
    color: #c4a0b4;
  }

  .btn {
    width: 100%;
    max-width: 260px;
    padding: 15px 24px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #e8789a, #c86fa0);
    color: white;
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 5px 18px rgba(200,100,150,0.25);
    transition: 0.2s ease;
    z-index: 1;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active {
    transform: scale(0.97);
  }

  .btn:disabled {
    opacity: 0.65;
  }

  .ctr {
    margin-top: 12px;
    font-size: 0.8rem;
    color: #c4a0b4;
    min-height: 18px;
    z-index: 1;
  }

  /* Extra-small phones */
  @media (max-width: 380px) {
    .root {
      padding: 18px 14px 24px;
    }

    .card {
      min-height: 210px;
      padding: 22px 18px;
    }

    .title {
      font-size: 1.6rem;
    }

    .btn {
      max-width: 100%;
    }
  }
</style>
