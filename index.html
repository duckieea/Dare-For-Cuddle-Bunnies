
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .root {
    width: 100%;
    min-height: 560px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 28px 16px 32px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(150deg, #fdf0f5 0%, #f5eeff 55%, #fff5f0 100%);
    border-radius: 20px;
    font-family: 'Lato', sans-serif;
  }

  .bg { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }

  .hp {
    position: absolute;
    opacity: 0.11;
    animation: floatUp linear infinite;
    color: #d4748a;
    user-select: none;
    font-style: normal;
  }

  @keyframes floatUp {
    0%   { transform: translateY(110%) rotate(0deg);  opacity: 0;    }
    10%  { opacity: 0.11; }
    90%  { opacity: 0.07; }
    100% { transform: translateY(-15%) rotate(18deg); opacity: 0;    }
  }

  .sp {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    animation: sparkle ease-in-out infinite;
  }

  @keyframes sparkle {
    0%,100% { opacity: 0; transform: scale(0); }
    50%     { opacity: 0.22; transform: scale(1); }
  }

  .title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(1.6rem, 6vw, 2.1rem);
    font-weight: 600;
    color: #8b4d6b;
    text-align: center;
    margin-bottom: 4px;
    line-height: 1.2;
    position: relative;
    z-index: 1;
  }

  .sub {
    font-size: clamp(0.7rem, 2.8vw, 0.85rem);
    color: #b08898;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    text-align: center;
    font-weight: 300;
    margin-bottom: 24px;
    position: relative;
    z-index: 1;
  }

  .card-wrap {
    width: 100%;
    max-width: 340px;
    min-height: 200px;
    position: relative;
    z-index: 1;
    margin-bottom: 22px;
  }

  .card {
    width: 100%;
    min-height: 200px;
    border-radius: 20px;
    background: rgba(255,255,255,0.84);
    border: 1px solid rgba(212,160,180,0.28);
    box-shadow: 0 6px 28px rgba(180,100,140,0.11);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px 22px;
    text-align: center;
    position: relative;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(255,220,230,0.35) 0%, rgba(240,210,255,0.18) 100%);
    pointer-events: none;
  }

  .card.out { animation: flipOut 0.32s ease forwards; }
  .card.in  { animation: flipIn  0.32s ease forwards; }

  @keyframes flipOut {
    0%   { transform: rotateY(0deg)   scale(1);    opacity: 1; }
    100% { transform: rotateY(88deg)  scale(0.93); opacity: 0; }
  }
  @keyframes flipIn {
    0%   { transform: rotateY(-88deg) scale(0.93); opacity: 0; }
    100% { transform: rotateY(0deg)   scale(1);    opacity: 1; }
  }

  .card-icon {
    position: absolute;
    top: 13px; left: 15px;
    font-size: 0.95rem;
    opacity: 0.32;
    font-style: normal;
  }

  .card-num {
    position: absolute;
    bottom: 11px; right: 14px;
    font-size: 0.68rem;
    color: rgba(170,110,140,0.45);
    font-family: 'Lato', sans-serif;
    font-weight: 300;
  }

  .card-text {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(0.95rem, 3.8vw, 1.1rem);
    color: #7a3f5c;
    line-height: 1.72;
    font-style: italic;
    font-weight: 400;
    position: relative;
    z-index: 1;
  }

  .card-text.ph { color: #c4a0b4; font-size: clamp(0.88rem, 3.4vw, 1rem); }

  .btn {
    position: relative;
    z-index: 1;
    background: linear-gradient(135deg, #e8789a, #c86fa0);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 36px;
    font-family: 'Lato', sans-serif;
    font-size: clamp(0.82rem, 3.2vw, 0.92rem);
    font-weight: 400;
    letter-spacing: 1.1px;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(200,100,150,0.28);
    transition: transform 0.14s ease, box-shadow 0.14s ease;
    min-width: 160px;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:hover  { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(200,100,150,0.36); }
  .btn:active { transform: scale(0.96); box-shadow: 0 2px 8px rgba(200,100,150,0.2); }
  .btn:disabled { opacity: 0.65; cursor: default; transform: none; }

  .ctr {
    position: relative;
    z-index: 1;
    font-size: 0.75rem;
    color: #c4a0b4;
    letter-spacing: 0.4px;
    font-weight: 300;
    margin-top: 10px;
    min-height: 16px;
  }
</style>

<div class="root">
  <h2 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Romantic dare card generator</h2>
  <div class="bg" id="bg"></div>

  <p class="title">Take a Dare</p>
  <p class="sub">Pick a card and see what fate gives you</p>

  <div class="card-wrap">
    <div class="card" id="card">
      <span class="card-icon">💌</span>
      <p class="card-text ph" id="ct">Tap below to reveal your dare 💌</p>
    </div>
  </div>

  <button class="btn" id="btn" onclick="draw()">Take a Card</button>
  <p class="ctr" id="ctr"></p>
</div>

<script>
const dares = [
  "Kiss the other person 6 times — if they react at all, you get to tease or tickle them.",
  "Give the other person a hickey anywhere they choose.",
  "Whisper exactly what you want to do to them… but neither of you can touch for the entire dare.",
  "Stay completely still for 2 minutes and try not to react — no matter what.",
  "Slowly graze your fingertips all over their body… stopping right there.",
  "Remove one piece of clothing of your choice.",
  "Make out intensely for 3 minutes — if either person makes a sound, the other gets to choose their next move.",
  "Make out with your hands behind your back — no touching allowed.",
  "Winner of this round gets full control of the next action within the game.",
  "Send your partner a voice note saying only their name… in 3 different accents.",
  "Give your partner a 60-second shoulder massage without saying a word.",
  "Whisper your favourite thing about their smile directly into their ear.",
  "Hold eye contact for 30 seconds without laughing.",
  "Tell your partner the last dream they appeared in.",
  "Read your partner a love poem — make one up on the spot.",
  "Let your partner draw something on your wrist with their finger and guess what it is.",
  "Say three things you find deeply attractive about your partner — no repeats.",
  "Slow dance together for one full song, no skipping.",
  "Describe your partner using only food metaphors.",
  "Give your partner a compliment that would make them blush.",
  "Tell your partner one secret you've never told anyone else.",
  "Make your partner laugh without using words.",
  "Look at your partner and describe what you see like you're writing a novel.",
  "Kiss for exactly 10 seconds. No more, no less.",
  "Sit back to back and take turns saying something you appreciate about the other.",
  "Trace letters on each other's palms and guess the words.",
  "Tell your partner the exact moment you knew things between you were real.",
  "Invent a cute nickname for your partner right now — it has to stick for the night.",
  "Serenade your partner with an improvised song about your last date.",
  "Describe your perfect day together in under 60 seconds.",
  "Ask your partner one question you've been too shy to ask.",
  "Hold your partner's face gently and look at them for 20 seconds in silence.",
  "Tell your partner what song reminds you of them and why.",
  "Give your partner a forehead kiss that lasts at least five seconds.",
  "Tell your partner the last thing that made you proud of them.",
  "Whisper something you want to do together that you haven't done yet.",
  "Say 'I love you' in three different languages.",
  "Let your partner change one thing about your look for the next hour.",
  "Plan a fantasy trip together — 2 minutes, make it extravagant.",
  "Tell your partner one thing you hope is still true about you both in ten years.",
  "Give your partner the slowest, gentlest kiss you're capable of.",
  "Describe your partner using only shades of colour.",
  "Ask your partner what they wish more people knew about you.",
  "Take a photo together right now — make it frame-worthy.",
  "Pick a moment from your time together and narrate it like a movie scene.",
  "Find your partner's favourite spot and give it extra attention for 30 seconds.",
  "Do your best impression of how your partner says your name.",
  "Recite the last thing you said to each other before falling asleep.",
  "Tell your partner the first physical thing you ever noticed about them.",
  "Close your eyes. Let your partner choose the next move."
];

const icons = ['✨','💫','🌸','💕','🌷'];
let last = -1, drawn = 0;
const used = new Set();

function draw() {
  const btn = document.getElementById('btn');
  const card = document.getElementById('card');
  btn.disabled = true;

  if (used.size >= dares.length) used.clear();
  let idx;
  do { idx = Math.floor(Math.random() * dares.length); }
  while (idx === last || used.has(idx));
  last = idx; used.add(idx); drawn++;

  card.classList.add('out');
  setTimeout(() => {
    const ct = document.getElementById('ct');
    ct.textContent = dares[idx];
    ct.classList.remove('ph');

    card.querySelector('.card-icon').textContent = icons[drawn % icons.length];
    let n = card.querySelector('.card-num');
    if (!n) { n = document.createElement('span'); n.className = 'card-num'; card.appendChild(n); }
    n.textContent = drawn;

    card.classList.remove('out');
    card.classList.add('in');

    document.getElementById('ctr').textContent = drawn + ' card' + (drawn === 1 ? '' : 's') + ' drawn';

    setTimeout(() => {
      card.classList.remove('in');
      btn.disabled = false;
      btn.textContent = 'Shuffle Again';
    }, 340);
  }, 320);
}

(function initParticles() {
  const bg = document.getElementById('bg');
  const hSymbols = ['♥','❤','♡'];
  for (let i = 0; i < 16; i++) {
    const h = document.createElement('span');
    h.className = 'hp';
    h.textContent = hSymbols[i % 3];
    h.style.cssText = `left:${Math.random()*94}%;font-size:${10+Math.random()*9}px;animation-duration:${13+Math.random()*15}s;animation-delay:${Math.random()*13}s;`;
    bg.appendChild(h);
  }
  const cols = ['#e8a0c0','#c9a5d8','#f0b8c8','#d4b0e8'];
  for (let i = 0; i < 20; i++) {
    const s = document.createElement('span');
    s.className = 'sp';
    const sz = 2 + Math.random() * 3;
    s.style.cssText = `left:${Math.random()*93}%;top:${Math.random()*93}%;width:${sz}px;height:${sz}px;background:${cols[i%4]};animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*5}s;`;
    bg.appendChild(s);
  }
})();
</script>
