
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap');

  .dare-root {
    min-height: 600px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #fdf0f5 0%, #f5eeff 50%, #fff5f0 100%);
    border-radius: 20px;
    font-family: 'Lato', sans-serif;
  }

  .hearts-bg { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }

  .heart-particle {
    position: absolute;
    font-size: 14px;
    opacity: 0.12;
    animation: floatUp linear infinite;
    color: #d4748a;
    user-select: none;
  }

  @keyframes floatUp {
    0% { transform: translateY(110%) rotate(0deg); opacity: 0; }
    10% { opacity: 0.12; }
    90% { opacity: 0.08; }
    100% { transform: translateY(-20%) rotate(20deg); opacity: 0; }
  }

  .sparkle {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #c9a5c2;
    opacity: 0;
    animation: sparkleAnim ease-in-out infinite;
  }

  @keyframes sparkleAnim {
    0%, 100% { opacity: 0; transform: scale(0); }
    50% { opacity: 0.25; transform: scale(1); }
  }

  .dare-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 2.2rem;
    font-weight: 600;
    color: #8b4d6b;
    margin: 0 0 0.3rem;
    text-align: center;
  }

  .dare-subtitle {
    font-size: 0.9rem;
    color: #b08898;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin: 0 0 2.2rem;
    text-align: center;
    font-weight: 300;
  }

  .card-scene {
    perspective: 1000px;
    width: 340px;
    max-width: 90vw;
    height: 230px;
    margin-bottom: 2rem;
    position: relative;
  }

  .dare-card {
    width: 100%;
    height: 100%;
    border-radius: 20px;
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(212,160,180,0.3);
    box-shadow: 0 8px 32px rgba(180,100,140,0.12), 0 2px 8px rgba(180,100,140,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
    box-sizing: border-box;
    position: relative;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .dare-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(255,220,230,0.4) 0%, rgba(240,210,255,0.2) 100%);
    pointer-events: none;
  }

  .dare-card.flip-out { animation: flipOut 0.35s ease forwards; }
  .dare-card.flip-in  { animation: flipIn  0.35s ease forwards; }

  @keyframes flipOut {
    0%   { transform: rotateY(0deg)   scale(1);    opacity: 1; }
    100% { transform: rotateY(90deg)  scale(0.92); opacity: 0; }
  }
  @keyframes flipIn {
    0%   { transform: rotateY(-90deg) scale(0.92); opacity: 0; }
    100% { transform: rotateY(0deg)   scale(1);    opacity: 1; }
  }

  .card-text {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.1rem;
    color: #7a3f5c;
    line-height: 1.7;
    font-style: italic;
    font-weight: 400;
    position: relative;
    z-index: 1;
  }

  .card-text.placeholder { color: #c4a0b4; font-size: 1rem; }

  .card-number {
    position: absolute;
    bottom: 12px;
    right: 16px;
    font-size: 0.7rem;
    color: rgba(180,120,150,0.5);
    font-family: 'Lato', sans-serif;
    letter-spacing: 0.5px;
    font-weight: 300;
  }

  .card-icon { position: absolute; top: 14px; left: 16px; font-size: 1rem; opacity: 0.35; }

  .btn-wrap { display: flex; flex-direction: column; align-items: center; gap: 0.8rem; }

  .take-btn {
    background: linear-gradient(135deg, #e8789a, #c86fa0);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 0.85rem 2.4rem;
    font-family: 'Lato', sans-serif;
    font-size: 0.95rem;
    font-weight: 400;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(200,100,150,0.3);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .take-btn:hover  { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(200,100,150,0.38); }
  .take-btn:active { transform: translateY(0) scale(0.97); box-shadow: 0 2px 10px rgba(200,100,150,0.22); }
  .take-btn:disabled { opacity: 0.7; cursor: default; transform: none; }

  .counter { font-size: 0.78rem; color: #c4a0b4; letter-spacing: 0.5px; font-weight: 300; }
</style>

<div class="dare-root">
  <h2 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Romantic dare card generator</h2>
  <div class="hearts-bg" id="heartsBg"></div>

  <p class="dare-title">Take a Dare</p>
  <p class="dare-subtitle">Pick a card and see what fate gives you</p>

  <div class="card-scene">
    <div class="dare-card" id="dareCard">
      <span class="card-icon">💌</span>
      <p class="card-text placeholder" id="cardText">Tap below to reveal your dare 💌</p>
    </div>
  </div>

  <div class="btn-wrap">
    <button class="take-btn" id="takeBtn" onclick="drawCard()">Take a Card</button>
    <span class="counter" id="counter" style="display:none"></span>
  </div>
</div>

<script>
const dares = [
  "Kiss the other person 6 times — if they react at all, you get to tease or tickle them.",
  "Give the other person a hickey anywhere they choose.",
  "Whisper exactly what you want to do to them… but neither of you can touch for the entire dare.",
  "Stay completely still for 2 minutes and try not to react — no matter what.",
  "Slowly graze your fingertips all over their body… stopping right there.",
  "Remove one piece of clothing of your choice.",
  "Make out intensely for 3 minutes — if either person makes a sound, the other gets to choose their next move.",
  "Make out with your hands behind your back — no touching allowed.",
  "Winner of this round gets full control of the next action within the game.",
  "Send your partner a voice note saying only their name… in 3 different accents.",
  "Give your partner a 60-second shoulder massage without saying a word.",
  "Whisper your favourite thing about their smile directly into their ear.",
  "Hold eye contact for 30 seconds without laughing.",
  "Tell your partner the last dream they appeared in.",
  "Read your partner a love poem — make one up on the spot.",
  "Let your partner draw something on your wrist with their finger and guess what it is.",
  "Say three things you find deeply attractive about your partner — no repeats.",
  "Slow dance together for one full song, no skipping.",
  "Describe your partner using only food metaphors.",
  "Give your partner a compliment that would make them blush.",
  "Tell your partner one secret you've never told anyone else.",
  "Make your partner laugh without using words.",
  "Look at your partner and describe what you see like you're writing a novel.",
  "Kiss for exactly 10 seconds. No more, no less.",
  "Sit back to back and take turns saying something you appreciate about the other.",
  "Trace letters on each other's palms and guess the words.",
  "Tell your partner the exact moment you knew things between you were real.",
  "Invent a cute nickname for your partner right now — it has to stick for the night.",
  "Serenade your partner with an improvised song about your last date.",
  "Describe your perfect day together in under 60 seconds.",
  "Ask your partner one question you've been too shy to ask.",
  "Hold your partner's face gently and look at them for 20 seconds in silence.",
  "Tell your partner what song reminds you of them and why.",
  "Give your partner a forehead kiss that lasts at least five seconds.",
  "Tell your partner the last thing that made you proud of them.",
  "Whisper something you want to do together that you haven't done yet.",
  "Say 'I love you' in three different languages.",
  "Let your partner change one thing about your look for the next hour.",
  "Plan a fantasy trip together — 2 minutes, make it extravagant.",
  "Tell your partner one thing you hope is still true about you both in ten years.",
  "Give your partner the slowest, gentlest kiss you're capable of.",
  "Describe your partner using only shades of colour.",
  "Ask your partner what they wish more people knew about you.",
  "Take a photo together right now — make it frame-worthy.",
  "Pick a moment from your time together and narrate it like a movie scene.",
  "Find your partner's favourite spot and give it extra attention for 30 seconds.",
  "Do your best impression of how your partner says your name.",
  "Recite the last thing you said to each other before falling asleep.",
  "Tell your partner the first physical thing you ever noticed about them.",
  "Close your eyes. Let your partner choose the next move."
];

let lastIndex = -1;
let drawn = 0;
const used = new Set();

function drawCard() {
  const btn = document.getElementById('takeBtn');
  const card = document.getElementById('dareCard');
  btn.disabled = true;

  if (used.size >= dares.length) used.clear();

  let idx;
  do { idx = Math.floor(Math.random() * dares.length); }
  while (idx === lastIndex || used.has(idx));

  lastIndex = idx;
  used.add(idx);
  drawn++;

  card.classList.add('flip-out');

  setTimeout(() => {
    const textEl = document.getElementById('cardText');
    textEl.textContent = dares[idx];
    textEl.classList.remove('placeholder');
    card.querySelector('.card-icon').textContent = ['✨','💫','🌸','💕','🌷'][drawn % 5];

    let numEl = card.querySelector('.card-number');
    if (!numEl) { numEl = document.createElement('span'); numEl.className = 'card-number'; card.appendChild(numEl); }
    numEl.textContent = drawn;

    card.classList.remove('flip-out');
    card.classList.add('flip-in');

    const counter = document.getElementById('counter');
    counter.style.display = 'block';
    counter.textContent = `${drawn} card${drawn === 1 ? '' : 's'} drawn`;

    setTimeout(() => {
      card.classList.remove('flip-in');
      btn.disabled = false;
      btn.textContent = 'Shuffle Again';
    }, 380);
  }, 350);
}

function initParticles() {
  const bg = document.getElementById('heartsBg');
  for (let i = 0; i < 18; i++) {
    const h = document.createElement('span');
    h.className = 'heart-particle';
    h.textContent = ['♥','❤','♡'][i % 3];
    h.style.left = (Math.random() * 96) + '%';
    h.style.animationDuration = (12 + Math.random() * 16) + 's';
    h.style.animationDelay = (Math.random() * 14) + 's';
    h.style.fontSize = (10 + Math.random() * 10) + 'px';
    bg.appendChild(h);
  }
  for (let i = 0; i < 22; i++) {
    const s = document.createElement('span');
    s.className = 'sparkle';
    s.style.left = (Math.random() * 94) + '%';
    s.style.top = (Math.random() * 94) + '%';
    s.style.animationDuration = (2 + Math.random() * 4) + 's';
    s.style.animationDelay = (Math.random() * 5) + 's';
    s.style.width = s.style.height = (2 + Math.random() * 3) + 'px';
    s.style.background = ['#e8a0c0','#c9a5d8','#f0b8c8','#d4b0e8'][i % 4];
    bg.appendChild(s);
  }
}

initParticles();
</script>
